<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile links</title>
    <style>
		:root {
		    /* Light Theme (Default) */
		    --bg: #f4f5f7;
		    --card: #ffffff;
		    --border: #e4e7eb;
		    --text: #1f2937;
		    --accent-m: #6d28d9; /* Deepened purple for contrast */
		    --accent-t: #0891b2; /* Deepened cyan for contrast */
		    --accent-x: #059669; /* Deepened emerald for contrast */
		}
		
		@media (prefers-color-scheme: dark) {
		    :root {
		        /* Dark Theme (Original Colors) */
		        --bg: #0d0e11;
		        --card: #16181d;
		        --border: #232730;
		        --text: #e3e6eb;
		        --accent-m: #a78bfa;
		        --accent-t: #22d3ee;
		        --accent-x: #34d399;
		    }
		}

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

		body {
			background-color: var(--bg);
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
			color: var(--text);
			padding: 16px;
			
			/* Fixes */
			min-height: 100vh; /* Fallback */
			min-height: 100dvh; /* Dynamically accounts for mobile browser bars */
			display: flex;
			flex-direction: column;
			justify-content: flex-end; /* Keeps items at bottom if there is extra space */
			
			/* Allows scrolling ONLY if the content is taller than the screen */
			overflow-y: auto; 
		}

        .section {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 20px; /* Creates clean separation between sections as they stack up */
        }

        .header {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            margin-left: 2px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header.movies { color: var(--accent-m); }
        .header.tech { color: var(--accent-t); }
        .header.misc { color: var(--accent-x); }

        .header::after {
            content: '';
            flex: 1;
            height: 1px;
            background: currentColor;
            opacity: 0.15;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 8px; /* Spaces the favicon and text */
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-decoration: none;
            color: var(--text);
            font-size: 0.85rem;
            font-weight: 500;
            height: 38px;
            padding: 0 12px;
            min-width: 0; /* Keeps grid items from breaking layout on truncation */
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            background-color: var(--border);
            transform: scale(0.98);
        }

        .favicon {
            width: 16px;
            height: 16px;
            flex-shrink: 0; /* Prevents the icon from squeezing */
            border-radius: 2px;
        }

        .btn-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <div class="section">
        <div class="header movies">Movies & Music</div>
        <div class="grid">
            <a href="https://pitchfork.com/" class="btn"><img class="favicon" src="https://www.google.com/s2/favicons?sz=32&domain=pitchfork.com" alt=""><span class="btn-text">Pitchfork</span></a>

			<a href="https://www.dn.se/" class="btn"><img class="favicon" src="https://www.google.com/s2/favicons?sz=32&domain=dn.se" alt=""><span class="btn-text">DN</span></a>

</body>
</html>
